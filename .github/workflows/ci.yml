name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - 'easytrojan.sh'
      - 'uninstall.sh'
      - 'hub_server.py'
      - 'lib/**'
      - 'scripts/ci_validate.sh'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'easytrojan.sh'
      - 'uninstall.sh'
      - 'hub_server.py'
      - 'lib/**'
      - 'scripts/ci_validate.sh'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: scripts + hub (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates

      - name: Run validation
        run: |
          set -euo pipefail
          chmod +x scripts/ci_validate.sh
          bash scripts/ci_validate.sh
