name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - 'easytrojan.sh'
      - 'uninstall.sh'
      - 'hub_server.py'
      - 'lib/**'
      - 'scripts/ci_validate.sh'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'easytrojan.sh'
      - 'uninstall.sh'
      - 'hub_server.py'
      - 'lib/**'
      - 'scripts/ci_validate.sh'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: scripts + hub (no install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates

      - name: Run validation
        run: |
          set -euo pipefail
          chmod +x scripts/ci_validate.sh
          bash scripts/ci_validate.sh
