name: Check Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}
    steps:
      - uses: actions/checkout@v5

      - name: Check Upstream SHA
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE_SHA=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: Caddy-Trojan-CI" \
            "https://api.github.com/repos/imgk/caddy-trojan/commits?per_page=1" \
            | jq -r '.[0].sha')

          if [ -z "$REMOTE_SHA" ] || [ "$REMOTE_SHA" = "null" ]; then
            echo "Failed to fetch upstream SHA"
            exit 1
          fi

          LOCAL_SHA=$(cat sha 2>/dev/null || echo "")

          if [ "$REMOTE_SHA" != "$LOCAL_SHA" ]; then
            printf '%s\n' "$REMOTE_SHA" > sha
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "Upstream updated: ${LOCAL_SHA:-none} -> ${REMOTE_SHA}"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          fi

      - name: Commit and Push
        if: steps.check.outputs.updated == 'true'
        run: |
          set -euo pipefail
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sha
          git commit -m "chore: update upstream sha to $(cut -c1-7 sha)"
          git push

  # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub security).
  # Explicitly call the build workflow when upstream changed.
  build:
    needs: check
    if: needs.check.outputs.updated == 'true'
    uses: ./.github/workflows/release.yml
    secrets: inherit
