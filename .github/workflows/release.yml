name: Build Caddy-Trojan

on:
  workflow_dispatch:
  push:
    paths:
      - 'sha'

permissions:
  contents: write

jobs:
  build-caddy-trojan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
          - os: linux
            arch: arm64
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Install Xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy-Trojan
        id: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p output
          cd output
          xcaddy build --with github.com/imgk/caddy-trojan

          # 获取版本号（仅在本机架构时可执行）
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            VERSION=$(./caddy version | awk '{print $1}')
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 打包
          FILENAME="caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          tar -czvf "../${FILENAME}" caddy
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}
          path: caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}.tar.gz

  release:
    needs: build-caddy-trojan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get Caddy version
        id: version
        run: |
          # 解压 amd64 版本获取版本号
          tar -xzf artifacts/caddy_trojan_linux_amd64.tar.gz -C /tmp
          VERSION=$(/tmp/caddy version | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            Caddy-Trojan ${{ steps.version.outputs.version }}
            
            Built with [imgk/caddy-trojan](https://github.com/imgk/caddy-trojan) plugin.
          tag_name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: artifacts/*.tar.gz
