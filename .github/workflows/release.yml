name: Build Caddy-Trojan

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      upstream_sha:
        description: 'Upstream imgk/caddy-trojan commit to build'
        required: false
        type: string
  push:
    paths:
      - 'sha'

permissions:
  contents: write

jobs:
  build-caddy-trojan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
          - os: linux
            arch: arm64
            goarch: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # caddy/v2 latest requires go >= 1.25.1 (GOTOOLCHAIN=local in runners)
          go-version: '1.25.x'
          # no go.mod in this repo (xcaddy builds in a temp module)
          cache: false

      - name: Install Xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy-Trojan
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          UPSTREAM_SHA: ${{ inputs.upstream_sha || '' }}
        run: |
          mkdir -p output
          cd output
          UPSTREAM_SHA="${UPSTREAM_SHA:-$(tr -d '[:space:]' < ../sha)}"
          if ! printf '%s' "$UPSTREAM_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "Invalid upstream SHA: ${UPSTREAM_SHA:-<empty>}" >&2
            exit 1
          fi
          echo "Building imgk/caddy-trojan at ${UPSTREAM_SHA}"
          xcaddy build --with "github.com/imgk/caddy-trojan@${UPSTREAM_SHA}"
          FILENAME="caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          tar -czvf "../${FILENAME}" caddy

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}
          path: caddy_trojan_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: build-caddy-trojan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare checksums and tag
        id: meta
        env:
          UPSTREAM_SHA: ${{ inputs.upstream_sha || '' }}
        run: |
          set -euo pipefail
          tar -xzf artifacts/caddy_trojan_linux_amd64.tar.gz -C /tmp
          VERSION=$(/tmp/caddy version | awk '{print $1}')
          UPSTREAM_SHA="${UPSTREAM_SHA:-$(tr -d '[:space:]' < sha)}"
          if ! printf '%s' "$UPSTREAM_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "Invalid upstream SHA: ${UPSTREAM_SHA:-<empty>}" >&2
            exit 1
          fi
          SHORT_SHA=$(printf '%s' "$UPSTREAM_SHA" | cut -c1-7)
          TAG="${VERSION}+trojan.${SHORT_SHA}"
          tar -czf artifacts/easytrojan_bundle.tar.gz easytrojan.sh hub_server.py lib
          (
            cd artifacts
            sha256sum *.tar.gz > SHA256SUMS
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          cat artifacts/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Caddy-Trojan ${{ steps.meta.outputs.version }}

            - Upstream plugin SHA: `${{ steps.meta.outputs.sha }}`
            - Built with [imgk/caddy-trojan](https://github.com/imgk/caddy-trojan)
            - EasyTrojan scripts are shipped as one versioned bundle
            - Verify every download with `SHA256SUMS`
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
